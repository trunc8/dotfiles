# ~/dotfiles/tmux.conf
# Simplified standalone config. Carries over keybindings and settings
# from the previous gpakosz/.tmux setup.

# --- Terminal ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,alacritty:Tc,tmux-256color:Tc,screen-256color:Tc"

# --- General ---
set -s escape-time 0
set -sg repeat-time 600
set -s focus-events on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on

# --- Prefix: C-a (replacing C-b) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Window/Pane creation ---
# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window retains current path
bind c new-window -c "#{pane_current_path}"

# --- Navigation ---
# Alt-arrow: switch panes (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Alt-Shift-arrow: switch windows (no prefix needed)
bind -n M-S-Left previous-window
bind -n M-S-Right next-window

# --- Convenience ---
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Sort sessions by name
bind s choose-tree -Zs -O name

# --- Visual ---
# Status bar
set -g status-position bottom
set -g status-style "bg=#303030,fg=#8a8a8a"
set -g status-left " #[bold]#S #[nobold]| "
set -g status-left-length 30
set -g status-right " #{?client_prefix,PREFIX ,}%R | %d %b | #H "
set -g status-right-length 50

# Window status
setw -g window-status-format " #I #W "
setw -g window-status-current-format " #I #W#{?window_zoomed_flag, Z,} "
setw -g window-status-current-style "bg=#00afff,fg=#080808,bold"

# Pane borders
set -g pane-border-style "fg=#303030"
set -g pane-active-border-style "fg=#00afff"

# Message style
set -g message-style "bg=#ffff00,fg=#080808,bold"
